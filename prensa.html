    /* 1. Definición de colores */
    :root {

    /* Navegación */
    .nav-global { 
        position: fixed; top: 20px; right: 20px; z-index: 9999; 
        display: flex; gap: 10px; background: rgba(0,0,0,0.7); 
        padding: 10px; border: 1px solid var(--blanco); border-radius: 5px;
    }

    .btn-nav {
        font-family: 'Anton', sans-serif; color: var(--blanco); text-decoration: none; 
        font-size: 1rem; padding: 5px 15px; transition: 0.3s;
        border: 1px solid transparent;
    }

    .btn-nav:hover { color: var(--negro); background: var(--blanco); border-bottom: 1px solid var(--blanco); }

    @media (max-width: 768px) {
        .nav-global { 
            top: auto; bottom: 0; left: 0; right: 0; 
            flex-wrap: wrap; justify-content: center; gap: 5px;
            background: var(--negro); border: none; border-top: 1px solid var(--blanco);
        }
    }

    /* Títulos */
    #main-title {
        position: fixed; width: 100%; text-align: center; top: 30vh; z-index: 100;
        font-family: 'Anton', sans-serif; font-size: 8rem; color: var(--blanco);
        transition: all 0.5s ease; pointer-events: none;
    }
    .shrink #main-title { top: 20px; font-size: 2rem; }

    /* Secciones */
    section { 
        height: 100vh; width: 100%; position: relative; 
        display: flex; align-items: center; justify-content: center;
        background-attachment: fixed; background-size: cover; background-position: center;
    }

    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }

    .content { 
        position: relative; z-index: 2; width: 80%; max-width: 600px;
        background: rgba(0,0,0,0.8); padding: 40px; border-left: 4px solid var(--blanco);
    }

    h2 { font-family: 'Anton', sans-serif; color: var(--blanco); margin: 0 0 15px; }

    .btn-ver-aca { 
        display: inline-block; padding: 10px 25px; border: 1px solid var(--blanco);
        color: var(--blanco); text-decoration: none; margin-top: 20px; font-weight: bold;
    }

    .btn-ver-aca:hover { background: var(--blanco); color: var(--negro); }

    /* Trama */
    .con-trama { position: relative; }
    .con-trama::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        pointer-events: none; z-index: 1; 
        background-image: repeating-linear-gradient(45deg, #ffffff 0px, #ffffff 1px, transparent 1px, transparent 6px);
        background-size: 3px 3px; opacity: 0.1; /* Bajé la opacidad para que no moleste visualmente */
    }
</style>
