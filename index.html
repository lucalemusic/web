  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  position: relative;
  overflow-x: hidden;
}

/* fondo */
.background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url("https://raw.githubusercontent.com/lucalemusic/lucalemusic/main/fondo.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: -2;
}

/* oscuridad */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* contenido arriba */
header, section, footer {

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 4rem;
      margin: 0;
    }

    p {
      opacity: 0.7;
    }

    .btn {
      margin-top: 20px;
      padding: 15px 30px;
      border: 1px solid white;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      background: black;
      color: white;
    }

    section {
      padding: 60px 20px;
    }

    iframe {
      width: 80%;
      max-width: 500px;
      height: 300px;
      border: none;
      margin-top: 20px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      border: 1px solid #333;
      padding: 20px;
      width: 250px;
    }

    footer {
      padding: 30px;
      font-size: 0.8rem;
      opacity: 0.5;
    }
    html {
  scroll-behavior: smooth;
}
