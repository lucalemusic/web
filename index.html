<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCALE | Rap Argentino & Diseño Industrial</title>
    
    <style>
        /* ESTILOS DEL PRELOADER */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex;
            justify-content: center; align-items: center;
        }
        .tridente-loader {
            width: 100px; height: 100px;
            background-color: #fff;
            mask: url('tridente.svg') no-repeat center;
            -webkit-mask: url('tridente.svg') no-repeat center;
            mask-size: contain;
            -webkit-mask-size: contain;
            animation: fillTrident 2s ease-in-out infinite;
        }
        @keyframes fillTrident {
            0% { clip-path: inset(100% 0 0 0); }
            50% { clip-path: inset(0% 0 0 0); }
            100% { clip-path: inset(0% 0 0 0); }
        }
    </style>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body> 
    <div id="preloader">
        <div class="tridente-loader"></div>
    </div>

    <video autoplay muted loop playsinline preload="auto" class="bg-video" poster="fondo.jpg">
        <source src="lucale.mp4" type="video/mp4">
    </video>

    <header class="hero">
        <div class="hero-content">
            <h1>LUCALE</h1>
            <p>Rap Crudo · Diseño Industrial · Gestión Cultural</p>
            <nav class="buttons">
                <a href="#music">MÚSICA</a>
                <a href="#studio">DISEÑO</a>
                <a href="#bio">BIOGRAFÍA</a>
            </nav>
        </div>
    </header>

    <div class="marquee-bar">
        <div class="marquee-text">
            LUCALE MUSIC PUBLISHING ™ · RAP CRUDO · DON TORCUATO · DISEÑO DE AUTOR · SILLÓN OCTA ® · PREMIOS GARDEL · PREMIOS MIN (ESPAÑA)
        </div>
    </div>

    <section id="music" class="music">
        <h2>MÚSICA | RAP DE AUTOR</h2>
        <div class="buttons" style="margin-top: 30px;">
            <a class="btn" href="https://open.spotify.com/artist/tu_id" target="_blank">SPOTIFY</a>
            <a class="btn" href="/LINKS/">LINKS Y ARCHIVO</a>
        </div>
    </section>

    <script>
        // SCRIPT PARA QUITAR EL PRELOADER CUANDO CARGA LA PAGINA
        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            preloader.style.opacity = '0';
            setTimeout(() => { preloader.style.display = 'none'; }, 500);
        });
    </script>
</body>
</html>
